<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Entrar | LensPro</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

</head>

<body>

<div class="auth-container">

    <div class="left-side">

        <div class="overlay"></div>

        <div class="content">

            <h1>LensPro</h1>

            <p>
                Sua plataforma completa para fotógrafos.
            </p>

        </div>

    </div>

    <div class="right-side">

        <form
            class="login-box"
            method="POST"
            action="{{ url_for('login') }}"
        >

            <h2>Entrar</h2>

            <p class="subtitle">
                Acesse sua conta LensPro
            </p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-message">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Digite seu email"
                    required
                >

            </div>

            <div class="input-group">

                <label>Senha</label>

                <input
                    type="password"
                    name="senha"
                    placeholder="Digite sua senha"
                    required
                >

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Lembrar de mim

                </label>

                <a href="{{ url_for('recuperar_senha') }}">
                    Esqueci minha senha
                </a>

            </div>

            <button
                type="submit"
                class="btn btn-primary"
            >
                Entrar
            </button>

            <div class="divider">
                <span>ou</span>
            </div>

            <button
                type="button"
                class="google-btn"
            >
                Entrar com Google
            </button>

            <p class="register">

                Não possui conta?

                <a href="{{ url_for('cadastro') }}">
                    Criar conta
                </a>

            </p>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
